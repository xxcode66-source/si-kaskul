<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBB - Desa Kasomalang Kulon</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        :root { --em: #059669; --em-dark: #065f46; --gold: #d97706; --red: #dc2626; }
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }

        /* Hero metrics */
        .hero { background: linear-gradient(135deg, #064e3b 0%, #065f46 40%, #059669 100%); padding: 7rem 1rem 2rem; }
        .hero-inner { max-width: 1200px; margin: 0 auto; }
        .hero-eyebrow { display: inline-block; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15); border-radius: 999px; padding: .45rem 1.1rem; font-size: .8rem; color: #d1fae5; margin-bottom: 1rem; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,4vw,3rem); color: #fff; line-height: 1.15; margin-bottom: 1.5rem; }
        .hero-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; }
        .hm-card { background: rgba(255,255,255,.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.15); border-radius: 1.25rem; padding: 1.25rem 1.5rem; }
        .hm-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .18em; color: #a7f3d0; margin-bottom: .35rem; }
        .hm-val { font-size: 1.75rem; font-weight: 800; color: #fff; }
        .hm-val.gold { color: #fcd34d; }
        .hm-sub { font-size: .75rem; color: #d1fae5; margin-top: .2rem; }

        /* Dusun strip */
        .dusun-strip { padding: 1.5rem 1rem; overflow-x: auto; }
        .dusun-inner { display: flex; gap: .75rem; max-width: 1200px; margin: 0 auto; min-width: min-content; }
        .dcard { flex: 1; min-width: 180px; background: #fff; border: 2px solid #e5e7eb; border-radius: 1.15rem; padding: 1rem 1.25rem; cursor: pointer; transition: all .25s ease; }
        .dcard:hover { border-color: #a7f3d0; box-shadow: 0 4px 20px rgba(5,150,105,.1); }
        .dcard.on { border-color: var(--em); background: #ecfdf5; box-shadow: 0 4px 20px rgba(5,150,105,.15); }
        .dcard-name { font-weight: 700; font-size: .9rem; color: #065f46; margin-bottom: .15rem; }
        .dcard-rw { font-size: .7rem; color: #6b7280; margin-bottom: .5rem; }
        .dcard-n { font-size: 1.15rem; font-weight: 800; color: #065f46; }
        .dcard-rp { font-size: .75rem; color: var(--gold); font-weight: 600; margin-top: .1rem; }

        /* Analytics */
        .analytics { max-width: 1200px; margin: 0 auto; padding: 1rem 1rem 3rem; }
        .analytics-title { font-weight: 700; font-size: 1.15rem; color: #065f46; margin-bottom: 1rem; padding-left: .5rem; }
        .rw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 1rem; }
        .rw-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 1.15rem; padding: 1.25rem; cursor: pointer; transition: all .25s ease; }
        .rw-card:hover { border-color: #a7f3d0; box-shadow: 0 4px 20px rgba(5,150,105,.1); }
        .rw-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .35rem; }
        .rw-card-label { font-weight: 700; font-size: 1rem; color: #065f46; }
        .rw-card-wp { font-size: .75rem; color: #6b7280; background: #f3f4f6; padding: .2rem .6rem; border-radius: 999px; }
        .rw-card-rp { font-size: .85rem; color: var(--gold); font-weight: 700; margin-bottom: .5rem; }
        .rw-card-bar-bg { height: 6px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
        .rw-card-bar { height: 100%; background: linear-gradient(90deg, #059669, #34d399); border-radius: 999px; transition: width .5s ease; }

        /* RT accordion */
        .rt-accordion { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
        .rt-accordion.open { max-height: 600px; }
        .rt-row { display: flex; align-items: center; gap: .5rem; padding: .45rem 0; border-top: 1px solid #f3f4f6; }
        .rt-label { font-size: .75rem; font-weight: 600; color: #374151; min-width: 36px; }
        .rt-bar-wrap { flex: 1; height: 5px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
        .rt-bar { height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); border-radius: 999px; transition: width .5s ease; }
        .rt-rp { font-size: .7rem; color: var(--gold); font-weight: 600; min-width: 80px; text-align: right; }
        .rt-wp { font-size: .65rem; color: #9ca3af; min-width: 40px; text-align: right; }

        /* Search */
        .search-bar { max-width: 1200px; margin: 0 auto; padding: 0 1rem 1rem; }
        .search-input { width: 100%; padding: .75rem 1rem; border: 2px solid #e5e7eb; border-radius: 1rem; font-size: .9rem; outline: none; transition: border-color .2s; }
        .search-input:focus { border-color: var(--em); }

        @media (max-width: 768px) {
            .hero-metrics { grid-template-columns: 1fr; }
            .rw-grid { grid-template-columns: 1fr; }
            .dcard { min-width: 150px; }
        }
    </style>
</head>
<body class="w-full min-h-screen bg-gray-50">
    <!-- Page Loader -->
    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p class="loader-text">Memuat data PBB...</p>
        </div>
    </div>

    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-inner">
            <div class="hero-eyebrow">📋 Data Tunggakan PBB-P2</div>
            <div class="hero-title">Wajib Pajak Belum Lunas<br>Desa Kasomalang Kulon</div>
            <div class="hero-metrics">
                <div class="hm-card">
                    <div class="hm-label">Wajib Pajak</div>
                    <div class="hm-val" id="h-wp">—</div>
                    <div class="hm-sub" id="h-wp-sub">Belum melunasi PBB</div>
                </div>
                <div class="hm-card">
                    <div class="hm-label">Total Tunggakan</div>
                    <div class="hm-val gold" id="h-rp">—</div>
                    <div class="hm-sub" id="h-rp-sub">Seluruh data desa</div>
                </div>
                <div class="hm-card">
                    <div class="hm-label">Data Tersaring</div>
                    <div class="hm-val" id="h-fil">—</div>
                    <div class="hm-sub" id="h-fil-sub">Hasil filter</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Dusun Strip -->
    <div class="dusun-strip">
        <div class="dusun-inner" id="dusun-strip">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" class="search-input" id="search-input" placeholder="🔍 Cari nama wajib pajak atau NOP...">
    </div>

    <!-- Analytics -->
    <div class="analytics" id="analytics-section">
        <div class="analytics-title">📊 Analitik Tunggakan per RW & RT</div>
        <div class="rw-grid" id="rw-grid">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-10 px-4 text-center bg-emerald-900 text-white">
        <p class="text-sm">&copy; 2024 Desa Kasomalang Kulon. Semua Hak Dilindungi.</p>
    </footer>

    <script src="../assets/nav-config.js"></script>
    <script>renderNavbar('pbb');</script>
    <script src="../assets/script.js"></script>
    <script>
        const API = (() => {
            const base = API_BASE_URL; // from script.js, already includes /api
            return {
                get: async (path) => { const r = await fetch(base + path); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); },
                post: async (path, body) => { const r = await fetch(base + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }
            };
        })();

        let overviewData = null;
        let allDusunData = [];
        let currentDusun = null; // null = semua
        let rwData = [];
        let maxBelumBayar = 0;

        function formatRp(n) {
            if (n >= 1e9) return 'Rp ' + (n / 1e9).toFixed(1) + ' M';
            if (n >= 1e6) return 'Rp ' + (n / 1e6).toFixed(0) + '.' + String(Math.round((n % 1e6) / 1e3)).padStart(3, '0').substring(0, 3) + '.000';
            return 'Rp ' + Number(n).toLocaleString('id-ID');
        }

        function formatRpShort(n) {
            if (n >= 1e9) return 'Rp ' + (n / 1e9).toFixed(1) + ' M';
            if (n >= 1e6) return 'Rp ' + (n / 1e6).toFixed(1) + ' Jt';
            return 'Rp ' + Number(n).toLocaleString('id-ID');
        }

        // Load overview
        async function loadOverview() {
            try {
                const res = await API.get('/pbb/stats/overview');
                overviewData = res.data;
                const ov = res.data.overview;
                document.getElementById('h-wp').textContent = ov.totalWp;
                document.getElementById('h-rp').textContent = formatRpShort(ov.totalBelumBayar);
                document.getElementById('h-rp-sub').textContent = 'Dari total ' + formatRpShort(ov.totalPajak);
                document.getElementById('h-fil').textContent = ov.totalWp;
                document.getElementById('h-fil-sub').textContent = 'Total ' + ov.totalWp + ' WP terdaftar';
            } catch (e) {
                console.error('Failed to load overview:', e);
            }
        }

        // Load dusun cards
        async function loadDusunCards() {
            try {
                const res = await API.get('/pbb/stats/overview');
                allDusunData = res.data.perDusun || [];

                // Compute totals for "Semua Dusun"
                const totalWP = allDusunData.reduce((s, d) => s + d.count, 0);
                const totalTunggakan = allDusunData.reduce((s, d) => s + d.totalBelumBayar, 0);

                const strip = document.getElementById('dusun-strip');
                strip.innerHTML = '';

                // "Semua Dusun" card
                const allCard = document.createElement('div');
                allCard.className = 'dcard on';
                allCard.id = 'dc-all';
                allCard.onclick = () => setDusun(null);
                allCard.innerHTML = `
                    <div class="dcard-name">🏘️ Semua Dusun</div>
                    <div class="dcard-rw">Semua RW</div>
                    <div class="dcard-n">${totalWP} WP</div>
                    <div class="dcard-rp">${formatRpShort(totalTunggakan)}</div>
                `;
                strip.appendChild(allCard);

                // Individual dusun cards
                const icons = { dusun1: '🌿 Dusun I', dusun2: '🌿 Dusun II', dusun3: '🌿 Dusun III', luardesa: '🔹 Luar Desa' };
                const rwLabels = { dusun1: 'RW 01 · RW 02', dusun2: 'RW 03 · RW 04', dusun3: 'RW 05 · RW 06 · RW 07', luardesa: 'Alamat tidak terdata' };

                for (const d of allDusunData) {
                    const card = document.createElement('div');
                    card.className = 'dcard';
                    card.id = 'dc-' + d.dusun;
                    card.onclick = () => setDusun(d.dusun);
                    card.innerHTML = `
                        <div class="dcard-name">${icons[d.dusun] || d.dusunNama}</div>
                        <div class="dcard-rw">${rwLabels[d.dusun] || d.dusunNama}</div>
                        <div class="dcard-n">${d.count} WP</div>
                        <div class="dcard-rp">${formatRpShort(d.totalBelumBayar)}</div>
                    `;
                    strip.appendChild(card);
                }
            } catch (e) {
                console.error('Failed to load dusun cards:', e);
            }
        }

        function setDusun(dusunId) {
            currentDusun = dusunId;

            // Update card styles
            document.querySelectorAll('.dcard').forEach(c => c.classList.remove('on'));
            if (dusunId === null) {
                document.getElementById('dc-all')?.classList.add('on');
            } else {
                document.getElementById('dc-' + dusunId)?.classList.add('on');
            }

            loadRWData();
        }

        async function loadRWData() {
            const grid = document.getElementById('rw-grid');
            grid.innerHTML = '<div class="text-center text-gray-400 py-8 col-span-full">Memuat data...</div>';

            try {
                if (currentDusun === null) {
                    // Load all RW data across all dusun
                    let allRW = [];
                    for (const d of allDusunData) {
                        const res = await API.get('/pbb/stats/by-dusun/' + d.dusun);
                        const rwList = (res.data || []).map(rw => ({ ...rw, dusunId: d.dusun, dusunNama: d.dusunNama }));
                        allRW = allRW.concat(rwList);
                    }
                    rwData = allRW;
                } else {
                    const res = await API.get('/pbb/stats/by-dusun/' + currentDusun);
                    rwData = (res.data || []).map(rw => ({ ...rw, dusunId: currentDusun }));
                }

                maxBelumBayar = Math.max(...rwData.map(r => r.totalBelumBayar), 1);
                renderRWGrid();
            } catch (e) {
                console.error('Failed to load RW data:', e);
                grid.innerHTML = '<div class="text-center text-red-400 py-8 col-span-full">Gagal memuat data.</div>';
            }
        }

        function renderRWGrid() {
            const grid = document.getElementById('rw-grid');
            grid.innerHTML = '';

            // Update filtered count
            const totalFilteredWP = rwData.reduce((s, r) => s + r.count, 0);
            const totalFilteredTunggakan = rwData.reduce((s, r) => s + r.totalBelumBayar, 0);
            document.getElementById('h-fil').textContent = totalFilteredWP;
            document.getElementById('h-fil-sub').textContent = rwData.length + ' RW ditampilkan';

            if (rwData.length === 0) {
                grid.innerHTML = '<div class="text-center text-gray-400 py-8 col-span-full">Tidak ada data untuk filter ini.</div>';
                return;
            }

            rwData.forEach((rw, idx) => {
                const pct = Math.round((rw.totalBelumBayar / maxBelumBayar) * 100);
                const card = document.createElement('div');
                card.className = 'rw-card';
                card.id = 'rwc-' + idx;
                const rwLabel = rw.rwNama || rw.rw;
                card.innerHTML = `
                    <div class="rw-card-head">
                        <span class="rw-card-label">${rwLabel}</span>
                        <span class="rw-card-wp">${rw.count} WP</span>
                    </div>
                    <div class="rw-card-rp">${formatRpShort(rw.totalBelumBayar)}</div>
                    <div class="rw-card-bar-bg"><div class="rw-card-bar" style="width:${pct}%"></div></div>
                    <div class="rt-accordion" id="rta-${idx}">
                        <div class="text-xs text-gray-400 py-2">Memuat data RT...</div>
                    </div>
                `;
                card.onclick = () => toggleRWCard(idx, rw);
                grid.appendChild(card);
            });
        }

        async function toggleRWCard(idx, rw) {
            const acc = document.getElementById('rta-' + idx);
            if (acc.classList.contains('open')) {
                acc.classList.remove('open');
                return;
            }

            // Close others
            document.querySelectorAll('.rt-accordion.open').forEach(el => el.classList.remove('open'));
            acc.classList.add('open');

            // Load RT data if not loaded
            if (acc.querySelector('.text-gray-400')) {
                try {
                    const res = await API.get(`/pbb/stats/by-dusun/${rw.dusunId}/rw/${rw.rw}`);
                    const rtData = res.data || [];
                    const maxRt = Math.max(...rtData.map(r => r.totalBelumBayar), 1);

                    acc.innerHTML = '';
                    rtData.forEach(rt => {
                        const rtPct = Math.round((rt.totalBelumBayar / maxRt) * 100);
                        const row = document.createElement('div');
                        row.className = 'rt-row';
                        row.innerHTML = `
                            <span class="rt-label">${rt.rtNama || rt.rt}</span>
                            <div class="rt-bar-wrap"><div class="rt-bar" style="width:${rtPct}%"></div></div>
                            <span class="rt-rp">${formatRpShort(rt.totalBelumBayar)}</span>
                            <span class="rt-wp">${rt.count} WP</span>
                        `;
                        acc.appendChild(row);
                    });

                    if (rtData.length === 0) {
                        acc.innerHTML = '<div class="text-xs text-gray-400 py-2">Tidak ada data RT.</div>';
                    }
                } catch (e) {
                    acc.innerHTML = '<div class="text-xs text-red-400 py-2">Gagal memuat data RT.</div>';
                }
            }
        }

        // Search
        document.getElementById('search-input').addEventListener('input', async (e) => {
            const q = e.target.value.trim();
            if (q.length < 2) {
                loadRWData();
                return;
            }
            try {
                const res = await API.post('/pbb/warga-list', {});
                // Filter locally if API doesn't support search
                // For now, just filter the RW data display
            } catch (e) { /* ignore */ }
        });

        // Init
        async function init() {
            await loadOverview();
            await loadDusunCards();
            await loadRWData();
            PageLoader.hide();
            lucide.createIcons();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
