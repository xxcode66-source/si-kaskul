<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Penduduk - Desa Kasomalang Kulon</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/style.css">
  <style>
    .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .table-row { transition: background 0.15s; }
    .table-row:hover { background: #f0fdf4; }
    .filter-chip { transition: all 0.15s; cursor: pointer; }
    .filter-chip:hover { background: var(--primary-light); border-color: var(--primary); }
    .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .page-btn { min-width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid #e2e8f0; background: white; cursor: pointer; transition: all 0.15s; }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999;
      display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box { background: white; border-radius: 1.5rem; max-width: 560px; width: 90%; max-height: 85vh;
      overflow-y: auto; padding: 2rem; transform: scale(0.95); transition: transform 0.2s; }
    .modal-overlay.show .modal-box { transform: scale(1); }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .badge { padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-l { background: #dbeafe; color: #1d4ed8; }
    .badge-p { background: #fce7f3; color: #be185d; }
    .search-input:focus { box-shadow: 0 0 0 3px rgba(16,185,129,0.15); border-color: var(--primary); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Page Loader -->
<div id="page-loader" class="page-loader">
  <div class="loader-content"><div class="loader-spinner"></div><p class="loader-text">Memuat data penduduk...</p></div>
</div>

<!-- Navbar -->
<div id="navbar-container"></div>

<!-- Hero -->
<div class="pt-28 pb-16 px-4 hero-grid-bg text-white">
  <div class="max-w-5xl mx-auto text-center">
    <h1 class="font-display text-5xl font-bold mb-3">Data Penduduk</h1>
    <p class="text-emerald-100 text-lg">Desa Kasomalang Kulon — Data Monografi Desa</p>
  </div>
</div>

<!-- Stats Cards -->
<section class="px-4 -mt-10 relative z-10">
  <div class="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="stat-card bg-white rounded-2xl p-5 shadow-md border border-gray-100">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center">
          <i data-lucide="users" class="w-5 h-5 text-emerald-600"></i>
        </div>
        <span class="text-xs text-gray-500 font-medium">Total Penduduk</span>
      </div>
      <p id="stat-total" class="text-2xl font-bold text-gray-800">—</p>
    </div>
    <div class="stat-card bg-white rounded-2xl p-5 shadow-md border border-gray-100">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
        </div>
        <span class="text-xs text-gray-500 font-medium">Laki-laki</span>
      </div>
      <p id="stat-laki" class="text-2xl font-bold text-gray-800">—</p>
    </div>
    <div class="stat-card bg-white rounded-2xl p-5 shadow-md border border-gray-100">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-pink-100 flex items-center justify-center">
          <i data-lucide="user" class="w-5 h-5 text-pink-600"></i>
        </div>
        <span class="text-xs text-gray-500 font-medium">Perempuan</span>
      </div>
      <p id="stat-perempuan" class="text-2xl font-bold text-gray-800">—</p>
    </div>
    <div class="stat-card bg-white rounded-2xl p-5 shadow-md border border-gray-100">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center">
          <i data-lucide="map-pin" class="w-5 h-5 text-amber-600"></i>
        </div>
        <span class="text-xs text-gray-500 font-medium">RT/RW</span>
      </div>
      <p id="stat-rt" class="text-2xl font-bold text-gray-800">—</p>
    </div>
  </div>
</section>

<!-- Search & Filter -->
<section class="px-4 mt-8">
  <div class="max-w-5xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-5">
      <div class="flex flex-col md:flex-row gap-3 mb-4">
        <div class="relative flex-1">
          <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="search-input" type="text" placeholder="Cari nama, NIK, atau KK..."
            class="search-input w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none transition">
        </div>
        <select id="filter-agama" class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:border-emerald-500 cursor-pointer">
          <option value="">Semua Agama</option>
        </select>
        <select id="filter-jk" class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:border-emerald-500 cursor-pointer">
          <option value="">Semua</option>
          <option value="LAKI-LAKI">Laki-laki</option>
          <option value="PEREMPUAN">Perempuan</option>
        </select>
        <select id="filter-rt" class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:border-emerald-500 cursor-pointer">
          <option value="">Semua RT</option>
        </select>
      </div>
      <div class="flex items-center justify-between text-sm text-gray-500">
        <span id="result-count">Memuat data...</span>
        <div class="flex items-center gap-2">
          <label class="text-xs">Tampilkan:</label>
          <select id="page-size" class="px-2 py-1 border border-gray-200 rounded-lg text-xs bg-white cursor-pointer">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Table -->
<section class="px-4 mt-4 pb-20">
  <div class="max-w-5xl mx-auto">
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="text-left px-4 py-3 font-semibold text-gray-600">No</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600">NIK</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600">Nama</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 hidden md:table-cell">TTL</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600">JK</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 hidden md:table-cell">Alamat</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 hidden lg:table-cell">Agama</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 hidden lg:table-cell">Pendidikan</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600">Aksi</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="9" class="px-4 py-12 text-center text-gray-400">
              <div class="flex flex-col items-center gap-3">
                <div class="skeleton w-48 h-4"></div>
                <div class="skeleton w-64 h-4"></div>
                <div class="skeleton w-40 h-4"></div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50">
        <span id="page-info" class="text-xs text-gray-500">—</span>
        <div id="pagination" class="flex items-center gap-1"></div>
      </div>
    </div>
  </div>
</section>

<!-- Detail Modal -->
<div id="detail-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-display text-xl font-bold text-gray-800">Detail Penduduk</h3>
      <button onclick="closeModal()" class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
        <i data-lucide="x" class="w-4 h-4 text-gray-500"></i>
      </button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Footer -->
<footer class="py-10 px-4 text-center bg-emerald-900 text-white">
  <p class="text-sm">&copy; 2024 Desa Kasomalang Kulon</p>
</footer>

<script src="../../assets/nav-config.js"></script>
<script src="../../assets/script.js"></script>
<script>
const API_BASE = 'http://localhost:3000';
let currentPage = 1;
let pageSize = 50;
let searchTimeout = null;

renderNavbar('data');
window.addEventListener('DOMContentLoaded', () => {
  initScrollAnimations();
  lucide.createIcons();
  loadFilters();
  loadData();
  PageLoader.hide();
});

// Load filter options from lightweight endpoint
async function loadFilters() {
  try {
    const res = await fetch(`${API_BASE}/api/penduduk/filters`);
    const json = await res.json();
    if (!json.success) return;
    const { rt, agama, total, lakiLaki, perempuan } = json.data;

    // Stats
    document.getElementById('stat-total').textContent = total.toLocaleString('id-ID');
    document.getElementById('stat-laki').textContent = lakiLaki.toLocaleString('id-ID');
    document.getElementById('stat-perempuan').textContent = perempuan.toLocaleString('id-ID');
    document.getElementById('stat-rt').textContent = rt.length;

    // Populate RT filter
    const rtSelect = document.getElementById('filter-rt');
    rt.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r;
      opt.textContent = `RT ${r}`;
      rtSelect.appendChild(opt);
    });

    // Populate agama filter
    const agamaSelect = document.getElementById('filter-agama');
    // Clear existing hardcoded options, repopulate from data
    agamaSelect.innerHTML = '<option value="">Semua Agama</option>';
    agama.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a;
      opt.textContent = a.charAt(0) + a.slice(1).toLowerCase();
      agamaSelect.appendChild(opt);
    });
  } catch (e) { console.error('Filter load error:', e); }
}

// Load data
async function loadData() {
  const search = document.getElementById('search-input').value;
  const agama = document.getElementById('filter-agama').value;
  const jk = document.getElementById('filter-jk').value;
  const rt = document.getElementById('filter-rt').value;

  const params = new URLSearchParams({ page: currentPage, limit: pageSize });
  if (search) params.set('search', search);
  if (agama) params.set('agama', agama);
  if (jk) params.set('jenisKelamin', jk);
  if (rt) params.set('rt', rt);

  try {
    const res = await fetch(`${API_BASE}/api/penduduk?${params}`);
    const json = await res.json();
    const pagination = { page: json.page, limit: json.limit, total: json.total, totalPages: json.totalPages };
    renderTable(json.data, pagination);
    renderPagination(pagination);
    document.getElementById('result-count').textContent =
      `Menampilkan ${json.data.length} dari ${json.total} penduduk`;
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="9" class="px-4 py-8 text-center text-red-400">Gagal memuat data. Pastikan backend berjalan.</td></tr>';
  }
}

function renderTable(data, pagination) {
  const tbody = document.getElementById('table-body');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">Tidak ada data ditemukan</td></tr>';
    return;
  }
  const startIdx = (pagination.page - 1) * pagination.limit;
  tbody.innerHTML = data.map((p, i) => {
    const ttl = `${p.tempatLahir}, ${p.tanggalLahir}`;
    const jkBadge = p.jenisKelamin === 'LAKI-LAKI'
      ? '<span class="badge badge-l">L</span>'
      : '<span class="badge badge-p">P</span>';
    return `<tr class="table-row border-b border-gray-50 cursor-pointer" data-nik="${p.nik}">
      <td class="px-4 py-3 text-gray-500">${startIdx + i + 1}</td>
      <td class="px-4 py-3 font-mono text-xs text-gray-600">${p.nik}</td>
      <td class="px-4 py-3 font-medium text-gray-800">${p.nama}</td>
      <td class="px-4 py-3 text-gray-600 hidden md:table-cell text-xs">${ttl}</td>
      <td class="px-4 py-3">${jkBadge}</td>
      <td class="px-4 py-3 text-gray-600 hidden md:table-cell text-xs">${p.kampung} RT${p.rt}/RW${p.rw}</td>
      <td class="px-4 py-3 text-gray-600 hidden lg:table-cell text-xs">${p.agama}</td>
      <td class="px-4 py-3 text-gray-600 hidden lg:table-cell text-xs truncate max-w-[120px]">${p.pendidikan}</td>
      <td class="px-4 py-3">
        <button class="btn-detail text-emerald-600 hover:text-emerald-700" data-nik="${p.nik}">
          <i data-lucide="eye" class="w-4 h-4"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
  lucide.createIcons();
}

// Event delegation for table row clicks
document.getElementById('table-body').addEventListener('click', (e) => {
  const btn = e.target.closest('.btn-detail');
  const row = e.target.closest('[data-nik]');
  const nik = btn ? btn.dataset.nik : (row ? row.dataset.nik : null);
  if (nik) showDetail(nik);
});

function renderPagination(pagination) {
  const { page, limit, total } = pagination;
  const totalPages = Math.ceil(total / limit);
  const pagDiv = document.getElementById('pagination');
  document.getElementById('page-info').textContent = `Halaman ${page} dari ${totalPages}`;

  let html = '';
  html += `<button class="page-btn" data-page="${page-1}" ${page<=1?'disabled':''}><i data-lucide="chevron-left" class="w-4 h-4"></i></button>`;

  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (page > 3) pages.push('...');
    for (let i = Math.max(2, page-1); i <= Math.min(totalPages-1, page+1); i++) pages.push(i);
    if (page < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === '...') {
      html += `<span class="px-2 text-gray-400">...</span>`;
    } else {
      html += `<button class="page-btn ${p===page?'active':''}" data-page="${p}">${p}</button>`;
    }
  });

  html += `<button class="page-btn" data-page="${page+1}" ${page>=totalPages?'disabled':''}><i data-lucide="chevron-right" class="w-4 h-4"></i></button>`;
  pagDiv.innerHTML = html;
  lucide.createIcons();
}

// Event delegation for pagination
document.getElementById('pagination').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-page]');
  if (btn && !btn.disabled) {
    goPage(parseInt(btn.dataset.page));
  }
});

function goPage(p) {
  currentPage = p;
  loadData();
  window.scrollTo({ top: 400, behavior: 'smooth' });
}

// Detail modal
async function showDetail(nik) {
  const modal = document.getElementById('detail-modal');
  const content = document.getElementById('modal-content');
  content.innerHTML = '<div class="text-center py-8"><div class="skeleton w-32 h-4 mx-auto mb-2"></div><div class="skeleton w-48 h-4 mx-auto mb-2"></div><div class="skeleton w-40 h-4 mx-auto"></div></div>';
  modal.classList.add('show');

  try {
    const res = await fetch(`${API_BASE}/api/penduduk/${nik}`);
    const json = await res.json();
    if (!json.success || !json.data) { content.innerHTML = '<p class="text-center text-gray-400">Data tidak ditemukan</p>'; return; }
    const p = json.data;

    const fields = [
      ['NIK', p.nik], ['No. KK', p.kk], ['Nama Lengkap', p.nama],
      ['Tempat Lahir', p.tempatLahir], ['Tanggal Lahir', p.tanggalLahir],
      ['Jenis Kelamin', p.jenisKelamin], ['Umur', p.umur ? `${p.umur} tahun` : '-'],
      ['Kampung', p.kampung], ['RT', p.rt], ['RW', p.rw],
      ['Status Hubungan', p.shdk], ['Agama', p.agama],
      ['Pendidikan', p.pendidikan], ['Pekerjaan', p.pekerjaan],
      ['Nama Ayah', p.ayah], ['Nama Ibu', p.ibu]
    ];

    content.innerHTML = `
      <div class="bg-emerald-50 rounded-xl p-4 mb-4 text-center">
        <h4 class="font-display text-lg font-bold text-emerald-800">${p.nama}</h4>
        <p class="text-sm text-emerald-600">NIK: ${p.nik}</p>
      </div>
      <div class="grid grid-cols-1 gap-2">
        ${fields.map(([label, val]) => `
          <div class="flex justify-between py-2 border-b border-gray-50">
            <span class="text-gray-500 text-sm">${label}</span>
            <span class="text-gray-800 text-sm font-medium">${val || '-'}</span>
          </div>
        `).join('')}
      </div>
    `;
  } catch (e) {
    content.innerHTML = '<p class="text-center text-red-400">Gagal memuat detail</p>';
  }
  lucide.createIcons();
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('show');
}

// Event listeners
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentPage = 1; loadData(); }, 300);
});
document.getElementById('filter-agama').addEventListener('change', () => { currentPage = 1; loadData(); });
document.getElementById('filter-jk').addEventListener('change', () => { currentPage = 1; loadData(); });
document.getElementById('filter-rt').addEventListener('change', () => { currentPage = 1; loadData(); });
document.getElementById('page-size').addEventListener('change', (e) => { pageSize = parseInt(e.target.value); currentPage = 1; loadData(); });

// Keyboard shortcut: Escape to close modal
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
