<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Desa Kasomalang Kulon</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="w-full min-h-screen bg-gradient-to-br from-emerald-800 to-emerald-600 flex items-center justify-center">
    <!-- Page Loader -->
        <div id="page-loader" class="page-loader">
            <div class="loader-content">
                <div class="loader-spinner"></div>
                <p class="loader-text">Memproses login...</p>
            </div>
        </div>

        <!-- Navigation -->
        <div id="navbar-container"></div>

        <!-- Login Container -->
    <div class="w-full px-4">
        <div class="max-w-md mx-auto">
            <!-- Main Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 fade-in">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i data-lucide="shield-check" style="width:40px;height:40px;color:#059669"></i>
                    </div>
                    <h1 class="font-display text-emerald-900 text-3xl font-bold mb-2">Desa Kasomalang Kulon</h1>
                    <p class="text-gray-500 text-sm">Portal Admin & Pelayanan Digital</p>
                </div>

                <!-- Tab Navigation -->
                <div class="grid grid-cols-4 gap-1 mb-6">
                    <button onclick="switchTab('admin')" id="tab-admin" class="py-2 px-2 rounded-lg font-semibold text-xs transition bg-emerald-600 text-white">Admin Desa</button>
                    <button onclick="switchTab('rt')" id="tab-rt" class="py-2 px-2 rounded-lg font-semibold text-xs transition bg-gray-200 text-gray-700">RT/RW</button>
                    <button onclick="switchTab('kolektor')" id="tab-kolektor" class="py-2 px-2 rounded-lg font-semibold text-xs transition bg-gray-200 text-gray-700">Kolektor</button>
                    <button onclick="switchTab('warga')" id="tab-warga" class="py-2 px-2 rounded-lg font-semibold text-xs transition bg-gray-200 text-gray-700">Masyarakat</button>
                </div>

                <!-- Admin Desa Login Form -->
                <form id="form-admin" class="space-y-5 block">
                    <div>
                        <label for="admin-email" class="block text-sm font-medium text-gray-700 mb-2">Email Admin</label>
                        <input id="admin-email" type="email" placeholder="Masukkan email admin" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="admin-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="admin-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('admin-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="admin-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="admin-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="shield-check" style="width:20px;height:20px"></i>
                        Login Admin Desa
                    </button>
                </form>

                <!-- RT/RW Login Form -->
                <form id="form-rt" class="space-y-5 hidden">
                    <div>
                        <label for="rt-email" class="block text-sm font-medium text-gray-700 mb-2">Email RT/RW</label>
                        <input id="rt-email" type="email" placeholder="Masukkan email RT/RW" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="rt-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="rt-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('rt-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="rt-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="rt-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="user" style="width:20px;height:20px"></i>
                        Login RT/RW
                    </button>
                </form>

                <!-- Kolektor Login Form -->
                <form id="form-kolektor" class="space-y-5 hidden">
                    <div>
                        <label for="kolektor-email" class="block text-sm font-medium text-gray-700 mb-2">Email Kolektor</label>
                        <input id="kolektor-email" type="email" placeholder="Masukkan email kolektor" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="kolektor-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="kolektor-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('kolektor-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="kolektor-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="kolektor-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="clipboard-list" style="width:20px;height:20px"></i>
                        Login Kolektor
                    </button>
                </form>

                <!-- Warga/Masyarakat Login Form -->
                <form id="form-warga" class="space-y-5 hidden">
                    <div>
                        <label for="warga-nik" class="block text-sm font-medium text-gray-700 mb-2">NIK (Nomor Induk Kependudukan)</label>
                        <input id="warga-nik" type="text" placeholder="16 digit NIK" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="warga-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="warga-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('warga-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="warga-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="warga-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="log-in" style="width:20px;height:20px"></i>
                        Login Masyarakat
                    </button>
                </form>

                <!-- Messages -->
                <div id="login-message" class="mt-4 hidden p-4 rounded-lg text-sm font-medium"></div>

                <!-- Links -->
                <div class="mt-6 text-center">
                    <a href="/" class="text-emerald-600 hover:text-emerald-700 font-semibold text-sm transition">← Kembali ke Beranda</a>
                </div>
            </div>

            <!-- Info -->
            <div class="mt-8 bg-white/20 backdrop-blur-sm rounded-2xl p-6 text-white text-sm">
                <div class="flex gap-2 mb-2">
                    <i data-lucide="info" style="width:20px;height:20px" class="flex-shrink-0"></i>
                    <strong>Informasi Login:</strong>
                </div>
                <p class="text-white/80">Gunakan kredensial yang diberikan oleh Administrator Desa Kasomalang Kulon. Jika belum memiliki akun, silakan hubungi perangkat desa.</p>
            </div>
        </div>
    </div>

    <script src="../assets/nav-config.js"></script>
    <script>renderNavbar('login');</script>
    <script src="../assets/script.js"></script>
    <script>
        // Uses API_BASE_URL from script.js (already includes /api path)

        let currentTab = 'admin';

        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['admin', 'rt', 'kolektor', 'warga'];
            const forms = ['form-admin', 'form-rt', 'form-kolektor', 'form-warga'];
            const tabIds = ['tab-admin', 'tab-rt', 'tab-kolektor', 'tab-warga'];

            tabs.forEach((t, i) => {
                const form = document.getElementById(forms[i]);
                const tabBtn = document.getElementById(tabIds[i]);
                if (t === tab) {
                    form.classList.remove('hidden');
                    form.classList.add('block');
                    tabBtn.classList.add('bg-emerald-600', 'text-white');
                    tabBtn.classList.remove('bg-gray-200', 'text-gray-700');
                } else {
                    form.classList.add('hidden');
                    form.classList.remove('block');
                    tabBtn.classList.remove('bg-emerald-600', 'text-white');
                    tabBtn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
            document.getElementById('login-message').classList.add('hidden');
        }

        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // Unified login handler
        async function handleLogin(emailField, passwordField, nikField, expectedRoles, redirectMap) {
            const email = emailField ? document.getElementById(emailField).value : '';
            const password = passwordField ? document.getElementById(passwordField).value : '';
            const nik = nikField ? document.getElementById(nikField).value : '';

            PageLoader.show('Memverifikasi kredensial...');
            try {
                const body = password ? { email, password } : { nik, password };
                const response = await fetch(API_BASE_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                }).then(r => r.json());

                if (response.success) {
                    const role = response.user.role;
                    if (!expectedRoles.includes(role)) {
                        showMessage('Akun ini tidak memiliki akses untuk portal ini.', 'error');
                        PageLoader.hide();
                        return;
                    }

                    localStorage.setItem('authUser', JSON.stringify(response.user));
                    localStorage.setItem('authToken', response.token);

                    showMessage('Login berhasil! Mengalihkan...', 'success');
                    PageLoader.hide();

                    const redirectUrl = redirectMap[role] || '/admin/dashboard';
                    setTimeout(() => { window.location.href = redirectUrl; }, 1200);
                } else {
                    showMessage(response.message || 'Login gagal', 'error');
                    PageLoader.hide();
                }
            } catch (error) {
                showMessage('Gagal terhubung ke server', 'error');
                PageLoader.hide();
            }
        }

        // Admin Form Submit
        document.getElementById('form-admin').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleLogin('admin-email', 'admin-password', null, ['admin'], { admin: '/admin/dashboard' });
        });

        // RT/RW Form Submit
        document.getElementById('form-rt').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleLogin('rt-email', 'rt-password', null, ['rt', 'rw'], { rt: '/admin/rt-dashboard', rw: '/admin/rt-dashboard' });
        });

        // Kolektor Form Submit
        document.getElementById('form-kolektor').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleLogin('kolektor-email', 'kolektor-password', null, ['kolektor'], { kolektor: '/admin/kolektor-dashboard' });
        });

        // Warga/Masyarakat Form Submit
        document.getElementById('form-warga').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleLogin(null, 'warga-password', 'warga-nik', ['warga'], { warga: '/pages/user-portal' });
        });

        function showMessage(msg, type) {
            const msgEl = document.getElementById('login-message');
            msgEl.textContent = msg;
            msgEl.classList.remove('hidden');
            msgEl.classList.remove('bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-blue-100', 'text-blue-700');
            if (type === 'error') {
                msgEl.classList.add('bg-red-100', 'text-red-700');
            } else if (type === 'info') {
                msgEl.classList.add('bg-blue-100', 'text-blue-700');
            } else {
                msgEl.classList.add('bg-green-100', 'text-green-700');
            }
        }
    </script>
</body>
</html>
