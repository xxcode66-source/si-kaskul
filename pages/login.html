<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Desa Kasomalang Kulon</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="w-full min-h-screen bg-gradient-to-br from-emerald-800 to-emerald-600 flex items-center justify-center">
    <!-- Page Loader -->
        <div id="page-loader" class="page-loader">
            <div class="loader-content">
                <div class="loader-spinner"></div>
                <p class="loader-text">Memproses login...</p>
            </div>
        </div>

        <!-- Navigation -->
        <div id="navbar-container"></div>

        <!-- Login Container -->
    <div class="w-full px-4">
        <div class="max-w-md mx-auto">
            <!-- Main Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 fade-in">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i data-lucide="shield-check" style="width:40px;height:40px;color:#059669"></i>
                    </div>
                    <h1 class="font-display text-emerald-900 text-3xl font-bold mb-2">Desa Kasomalang Kulon</h1>
                    <p class="text-gray-500 text-sm">Portal Admin & Pelayanan Digital</p>
                </div>

                <!-- Tab Navigation -->
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button onclick="switchTab('petugas')" id="admin-tab" class="py-2 px-4 rounded-lg font-semibold text-sm transition bg-emerald-600 text-white">Petugas</button>
                    <button onclick="switchTab('penduduk')" id="user-tab" class="py-2 px-4 rounded-lg font-semibold text-sm transition bg-gray-200 text-gray-700">Penduduk</button>
                </div>

                <!-- Petugas Login Form -->
                <form id="admin-form" class="space-y-5 block">
                    <div>
                        <label for="admin-email" class="block text-sm font-medium text-gray-700 mb-2">Email Petugas</label>
                        <input id="admin-email" type="email" placeholder="admin@kasomalangkulon.id" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="admin-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="admin-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('admin-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="admin-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="admin-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="log-in" style="width:20px;height:20px"></i>
                        Login Admin
                    </button>
                </form>

                <!-- User Login Form -->
                <form id="user-form" class="space-y-5 hidden">
                    <div>
                        <label for="user-nik" class="block text-sm font-medium text-gray-700 mb-2">NIK (Nomor Induk Kependudukan)</label>
                        <input id="user-nik" type="text" placeholder="16 digit NIK" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                    </div>
                    <div>
                        <label for="user-password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <input id="user-password" type="password" placeholder="Masukkan password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition" required>
                            <button type="button" onclick="togglePasswordVisibility('user-password')" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-700">
                                <i data-lucide="eye" style="width:20px;height:20px"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input id="user-remember" type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-2 focus:ring-emerald-500">
                        <label for="user-remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 btn-hover-glow flex items-center justify-center gap-2">
                        <i data-lucide="log-in" style="width:20px;height:20px"></i>
                        Login Penduduk
                    </button>
                </form>

                <!-- Messages -->
                <div id="login-message" class="mt-4 hidden p-4 rounded-lg text-sm font-medium"></div>

                <!-- Links -->
                <div class="mt-6 text-center">
                    <a href="../index.html" class="text-emerald-600 hover:text-emerald-700 font-semibold text-sm transition">← Kembali ke Beranda</a>
                </div>
            </div>

            <!-- Demo Info -->
            <div class="mt-8 bg-white/20 backdrop-blur-sm rounded-2xl p-6 text-white text-sm">
                <div class="flex gap-2 mb-2">
                    <i data-lucide="info" style="width:20px;height:20px" class="flex-shrink-0"></i>
                    <strong>Kredensial Demo:</strong>
                </div>
                <ul class="ml-7 space-y-1 text-white/80">
                    <li>Admin: <code class="bg-white/10 px-2 py-1 rounded">admin@kasomalangkulon.id</code> / <code class="bg-white/10 px-2 py-1 rounded">admin123</code></li>
                    <li>Penduduk: <code class="bg-white/10 px-2 py-1 rounded">1234567890123456</code> / <code class="bg-white/10 px-2 py-1 rounded">123456</code></li>
                </ul>
            </div>
        </div>
    </div>

    <script src="../assets/nav-config.js"></script>
    <script>renderNavbar('login');</script>
    <script src="../assets/script.js"></script>
    <script>
        let currentTab = 'petugas';

        function switchTab(tab) {
            currentTab = tab;
            const adminForm = document.getElementById('admin-form');
            const userForm = document.getElementById('user-form');
            const adminTab = document.getElementById('admin-tab');
            const userTab = document.getElementById('user-tab');

            if (tab === 'petugas') {
                adminForm.classList.remove('hidden');
                userForm.classList.add('hidden');
                adminTab.classList.add('bg-emerald-600', 'text-white');
                adminTab.classList.remove('bg-gray-200', 'text-gray-700');
                userTab.classList.remove('bg-emerald-600', 'text-white');
                userTab.classList.add('bg-gray-200', 'text-gray-700');
            } else {
                adminForm.classList.add('hidden');
                userForm.classList.remove('hidden');
                userTab.classList.add('bg-emerald-600', 'text-white');
                userTab.classList.remove('bg-gray-200', 'text-gray-700');
                adminTab.classList.remove('bg-emerald-600', 'text-white');
                adminTab.classList.add('bg-gray-200', 'text-gray-700');
            }
            document.getElementById('login-message').classList.add('hidden');
        }

        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // Petugas Form Submit
        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            PageLoader.show('Memverifikasi kredensial...');
            try {
                const response = await fetchWithLoader(`${API_BASE_URL}/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.success) {
                    // Save auth to localStorage
                    localStorage.setItem('adminUser', JSON.stringify(response.user));
                    localStorage.setItem('adminToken', response.token);

                    showMessage('Login berhasil! Mengalihkan ke dashboard...', 'success');
                    PageLoader.hide();

                    // Redirect based on role
                    const role = response.user.role;
                    let redirectUrl;
                    if (role === 'admin') {
                        redirectUrl = '../admin/dashboard.html';
                    } else if (role === 'rt') {
                        redirectUrl = '../admin/rt-dashboard.html';
                    } else if (role === 'kolektor') {
                        redirectUrl = '../admin/kolektor-dashboard.html';
                    } else {
                        showMessage('Role tidak dikenal. Hubungi administrator.', 'error');
                        PageLoader.hide();
                        return;
                    }

                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1200);
                } else {
                    showMessage(response.message || 'Login gagal', 'error');
                    PageLoader.hide();
                }
            } catch (error) {
                showMessage('Gagal terhubung ke server login', 'error');
                PageLoader.hide();
            }
        });

        // Penduduk Form Submit
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showMessage('Fitur Segera Hadir', 'info');
        });

        function showMessage(msg, type) {
            const msgEl = document.getElementById('login-message');
            msgEl.textContent = msg;
            msgEl.classList.remove('hidden');
            msgEl.classList.remove('bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-blue-100', 'text-blue-700');
            if (type === 'error') {
                msgEl.classList.add('bg-red-100', 'text-red-700');
            } else if (type === 'info') {
                msgEl.classList.add('bg-blue-100', 'text-blue-700');
            } else {
                msgEl.classList.add('bg-green-100', 'text-green-700');
            }
        }
    </script>
</body>
</html>
