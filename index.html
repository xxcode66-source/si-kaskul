  <style>
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        
        /* Staggered animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInSlow { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 0 rgba(16,185,129,0.2); } 50% { box-shadow: 0 0 20px rgba(16,185,129,0.4); } }
        
        .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.6s, transform 0.6s; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        
        /* Stagger effect utilities */
        .stagger-item { animation: slideUp 0.8s ease-out forwards; opacity: 0; }
        .stagger-item:nth-child(1) { animation-delay: 0.1s; }
        .stagger-item:nth-child(2) { animation-delay: 0.2s; }
        .stagger-item:nth-child(3) { animation-delay: 0.3s; }
        .stagger-item:nth-child(4) { animation-delay: 0.4s; }
        .stagger-item:nth-child(5) { animation-delay: 0.5s; }
        .stagger-item:nth-child(6) { animation-delay: 0.6s; }
        
        .hero-overlay { background: linear-gradient(135deg, rgba(6,78,59,0.7), rgba(16,185,129,0.4)); }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255,255,255,0.85); }
        
        /* Gallery animations */
        .gallery-item { position: relative; overflow: hidden; }
        .gallery-item img { 
          transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .gallery-item:hover img { transform: scale(1.12) rotate(2deg); filter: brightness(1.1); }
        
        /* News cards with elevation */
        .news-card-animated {
          transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
          position: relative;
        }
        .news-card-animated:hover {
          transform: translateY(-8px);
          box-shadow: 0 20px 40px rgba(16,185,129,0.15);
        }
        
        /* PBB cards with glow */
        .pbb-card-animated {
          transition: all 0.4s ease;
          position: relative;
          border-left: 4px solid #10b981;
        }
        .pbb-card-animated:hover {
          transform: translateY(-5px);
          box-shadow: 0 15px 35px rgba(16,185,129,0.2);
          border-left-color: #059669;
        }
        
        /* Stat numbers animation */
        .stat-number {
          animation: slideUp 0.8s ease-out 0.3s forwards;
          opacity: 0;
        }
        
        /* Button animations */
        .btn-hover-glow {
          transition: all 0.3s ease;
          position: relative;
          overflow: hidden;
        }
        .btn-hover-glow:hover {
          transform: scale(1.05);
          box-shadow: 0 8px 20px rgba(16,185,129,0.3);
        }
        .btn-hover-glow:active {
          transform: scale(0.98);
        }
        
        /* Filter button transitions */
        .filter-btn-animated {
          transition: all 0.3s ease;
        }
        .filter-btn-animated.active {
          animation: slideUp 0.3s ease-out;
        }
        
        /* Lightbox animations */
        .lightbox { 
          display: none; 
          position: fixed; 
          inset: 0; 
          z-index: 100; 
          background: rgba(0,0,0,0.95); 
          align-items: center; 
          justify-content: center;
          opacity: 0;
          transition: opacity 0.3s ease;
        }
        .lightbox.active { 
          display: flex;
          opacity: 1;
        }
        .lightbox img {
          animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
          max-width: 90vw;
          max-height: 85vh;
          object-fit: contain;
        }
        
        /* Parallax effect for hero */
        .hero-image-parallax {
          transform: translateZ(0);
        }
        
        /* Section entrance animations */
        .section-reveal {
          animation: fadeInSlow 0.6s ease-out;
        }
    </style>

  <script>
        lucide.createIcons();

        // Mobile menu
        document.getElementById('mobile-toggle').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // Scroll animations
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Gallery lightbox
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', () => {
                const src = item.querySelector('img').src;
                if (src) {
                    document.getElementById('lightbox-img').src = src;
                    document.getElementById('lightbox').classList.add('active');
                }
            });
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const msg = document.getElementById('login-msg');
            msg.textContent = 'Silakan integrasikan dengan backend Anda.';
            msg.classList.remove('hidden');
        });

        // PBB form
        document.getElementById('pbb-form').addEventListener('submit', e => {
            e.preventDefault();
            const nop = document.getElementById('pbb-nop').value;
            if (nop.trim()) {
                document.getElementById('pbb-result').classList.remove('hidden');
                document.getElementById('pbb-nop').value = '';
            }
        });

        // Bansos data
        const bansosData = [
            { rt: 'rt1', no: 1, nama: 'Siti Nurhaliza', alamat: 'Jl. Raya No. 12', program: 'PKH + BPNT' },
            { rt: 'rt1', no: 2, nama: 'Ahmad Sutisna', alamat: 'Jl. Raya No. 15', program: 'BPNT' },
            { rt: 'rt1', no: 3, nama: 'Rina Handoko', alamat: 'Jl. Raya No. 18', program: 'PKH' },
            { rt: 'rt2', no: 4, nama: 'Budi Santoso', alamat: 'Jl. Tengah No. 5', program: 'PKH + BPNT' },
            { rt: 'rt2', no: 5, nama: 'Dewi Lestari', alamat: 'Jl. Tengah No. 8', program: 'BPNT' },
            { rt: 'rt3', no: 6, nama: 'Hendra Wijaya', alamat: 'Jl. Utama No. 22', program: 'PKH + BPNT' },
            { rt: 'rt3', no: 7, nama: 'Lisa Amelia', alamat: 'Jl. Utama No. 25', program: 'PKH' },
            { rt: 'rt4', no: 8, nama: 'Roni Pratama', alamat: 'Jl. Maju No. 7', program: 'BPNT' },
            { rt: 'rt4', no: 9, nama: 'Susi Hermawan', alamat: 'Jl. Maju No. 10', program: 'PKH + BPNT' }
        ];

        let currentRT = 'rt1';

        function filterBansos(rt) {
            currentRT = rt;
            const filtered = bansosData.filter(item => item.rt === rt);
            const tbody = document.getElementById('bansos-table-body');
            tbody.innerHTML = '';
            filtered.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-emerald-50 transition';
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm text-gray-700">${item.no}</td>
                    <td class="px-4 py-3 text-sm text-gray-700 font-medium">${item.nama}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.alamat}</td>
                    <td class="px-4 py-3 text-sm text-center">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold ${item.program.includes('PKH') && item.program.includes('BPNT') ? 'bg-emerald-100 text-emerald-700' : item.program === 'PKH' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}">${item.program}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
            updateFilterButtons();
        }

        function updateFilterButtons() {
            document.querySelectorAll('[data-template-id^="bansos-filter"]').forEach(btn => {
                const rt = btn.getAttribute('onclick').match(/'(rt\d+)'/)[1];
                if (rt === currentRT) {
                    btn.classList.add('bg-emerald-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-700');
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('bg-emerald-600', 'text-white', 'active');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
        }

        // Initialize Bansos table
        window.addEventListener('DOMContentLoaded', () => {
            filterBansos('rt1');
        });
    </script>
